<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#020a10"><title>JARVIS // 核心界面</title>
  <style>
    :root{--cyan:#39f6ec;--blue:#3aa8ff;--green:#6cff9b;--text:#dffeff;--muted:#729a9e}*{box-sizing:border-box}html,body{margin:0;height:100%;background:#020a10;color:var(--text);font-family:Consolas,"Microsoft YaHei",monospace;overflow:hidden}canvas{position:fixed;inset:0}.grid{position:fixed;inset:0;background-image:linear-gradient(rgba(57,246,236,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(57,246,236,.035) 1px,transparent 1px);background-size:46px 46px;mask-image:linear-gradient(to bottom,black,transparent)}
    header{position:relative;z-index:2;height:70px;padding:0 30px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(57,246,236,.18);background:rgba(2,10,16,.45);backdrop-filter:blur(8px)}.brand{font:700 19px Arial,sans-serif;color:var(--cyan)}.brand small{display:block;margin-top:4px;color:var(--muted);font:9px Consolas;letter-spacing:0}.header-status{display:flex;gap:24px;font-size:10px;color:var(--green)}
    main{position:relative;z-index:1;height:calc(100% - 70px);display:grid;grid-template-columns:250px 1fr 250px;gap:20px;padding:20px 30px 28px}.side{display:flex;flex-direction:column;gap:16px}.module{padding:17px;border:1px solid rgba(57,246,236,.18);background:rgba(2,17,23,.45);backdrop-filter:blur(7px)}.module h2{margin:0 0 15px;color:var(--cyan);font-size:10px;font-weight:400}.metric{margin:12px 0}.metric-row{display:flex;justify-content:space-between;color:#a8c9ca;font-size:10px}.bar{height:3px;margin-top:7px;background:#102b31}.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--blue),var(--cyan));box-shadow:0 0 8px var(--cyan);animation:load 1.5s ease-out}.log{font-size:9px;line-height:2;color:#719799}.log b{color:var(--green);font-weight:400}
    .core{display:grid;place-items:center;min-width:0}.reactor{position:relative;width:min(52vh,460px);aspect-ratio:1;border:1px solid rgba(57,246,236,.2);border-radius:50%;display:grid;place-items:center;box-shadow:0 0 100px rgba(57,246,236,.08)}.ring{position:absolute;border:1px solid var(--cyan);border-radius:50%;opacity:.55}.r1{inset:9%;border-style:dashed;animation:spin 18s linear infinite}.r2{inset:22%;border-color:var(--blue);border-width:2px;animation:spin 9s linear infinite reverse}.r3{inset:34%;box-shadow:0 0 30px rgba(57,246,236,.2);animation:pulse 2.4s ease-in-out infinite}.coretext{text-align:center}.coretext strong{display:block;font:700 clamp(28px,5vw,54px) Arial,sans-serif;color:white;text-shadow:0 0 18px var(--cyan)}.coretext span{display:block;margin-top:10px;color:var(--cyan);font-size:10px}.orbit{position:absolute;inset:4%;border-top:2px solid var(--cyan);border-radius:50%;animation:spin 5s linear infinite}.orbit:after{content:"";position:absolute;right:16%;top:7%;width:7px;height:7px;border-radius:50%;background:white;box-shadow:0 0 16px 5px var(--cyan)}
    .time{font:600 26px Arial,sans-serif;color:white}.date{margin-top:4px;color:var(--muted);font-size:10px}.command{color:#9bc2c4;font-size:10px;line-height:1.7}.command:before{content:"> ";color:var(--green)}button{border:1px solid rgba(57,246,236,.35);background:transparent;color:var(--cyan);height:36px;width:100%;font:10px Consolas;cursor:pointer}button:hover{background:rgba(57,246,236,.09)}
    @keyframes spin{to{transform:rotate(360deg)}}@keyframes pulse{50%{transform:scale(1.05);opacity:1}}@keyframes load{from{width:0}}@media(max-width:850px){main{grid-template-columns:1fr;padding:16px}.side{display:none}.reactor{width:min(80vw,58vh)}header{padding:0 18px}.header-status span:not(:last-child){display:none}}
  </style>
</head>
<body><canvas id="space"></canvas><div class="grid"></div>
  <header><div class="brand">J.A.R.V.I.S.<small>JUST A RATHER VERY INTELLIGENT SYSTEM</small></div><div class="header-status"><span>NETWORK / ONLINE</span><span>SECURITY / ACTIVE</span><span id="headTime"></span></div></header>
  <main><aside class="side">
    <section class="module"><h2>// SYSTEM PERFORMANCE</h2><div class="metric"><div class="metric-row"><span>核心负载</span><span id="cpu">38%</span></div><div class="bar"><i id="cpuBar" style="width:38%"></i></div></div><div class="metric"><div class="metric-row"><span>内存矩阵</span><span>64%</span></div><div class="bar"><i style="width:64%"></i></div></div><div class="metric"><div class="metric-row"><span>神经网络</span><span>92%</span></div><div class="bar"><i style="width:92%"></i></div></div></section>
    <section class="module log"><h2>// EVENT STREAM</h2><div><b>[OK]</b> 身份密钥已确认</div><div><b>[OK]</b> 数据链路已建立</div><div><b>[OK]</b> 防御协议已加载</div><div><b>[OK]</b> 助手核心运行中</div></section>
  </aside><section class="core"><div class="reactor"><div class="ring r1"></div><div class="ring r2"></div><div class="ring r3"></div><div class="orbit"></div><div class="coretext"><strong><a href="online.html" id="onlineLink" style="color:inherit;text-decoration:none;">ONLINE</a></strong><span>ARC CORE // STABLE</span></div></div></section>
  <aside class="side"><section class="module"><h2>// LOCAL TIME</h2><div class="time" id="time"></div><div class="date" id="date"></div></section><section class="module"><h2>// ASSISTANT</h2><div class="command" id="command">欢迎回来，系统已准备就绪。</div></section><section class="module"><h2>// SESSION</h2><button id="logout">断开安全连接</button></section></aside></main>
  <script>
    if(sessionStorage.getItem('jarvis_session')!=='active')location.replace('index.html');
    const c=document.getElementById('space'),x=c.getContext('2d');let stars=[];function size(){c.width=innerWidth;c.height=innerHeight;stars=Array.from({length:110},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.4+.2,v:Math.random()*.25+.05}))}size();addEventListener('resize',size);function draw(){x.clearRect(0,0,c.width,c.height);for(const s of stars){s.y+=s.v;if(s.y>c.height)s.y=0;x.fillStyle=`rgba(57,246,236,${.15+s.r/3})`;x.fillRect(s.x,s.y,s.r,s.r)}requestAnimationFrame(draw)}draw();
    function tick(){const n=new Date(),t=n.toLocaleTimeString('zh-CN',{hour12:false});document.getElementById('time').textContent=t;document.getElementById('headTime').textContent=t;document.getElementById('date').textContent=n.toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'})}tick();setInterval(tick,1000);
    setInterval(()=>{const v=28+Math.floor(Math.random()*24);document.getElementById('cpu').textContent=v+'%';document.getElementById('cpuBar').style.width=v+'%'},1800);document.getElementById('logout').onclick=()=>{sessionStorage.removeItem('jarvis_session');location.replace('index.html')};
  </script>
</body></html>
